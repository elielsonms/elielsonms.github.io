name: Generate & Deploy Portfolio

on:
  push:
    branches: [main]
    paths:
      - 'datasource.json'
      - 'public/index.html'
      - 'styles/main.css'
      - 'scripts/email-reveal.js'
      - 'scripts/generate-html.js'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Create dist directory
        run: mkdir -p dist/styles dist/scripts
      
      - name: Generate HTML
        run: node scripts/generate-html.js

      - name: Copy static assets
        run: |
          cp styles/main.css dist/styles/main.css
          cp scripts/email-reveal.js dist/scripts/email-reveal.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta name="keywords" content="{{META_KEYWORDS}}">
  <meta name="author" content="{{NAME}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{CANONICAL_URL}}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{PAGE_TITLE}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:site_name" content="{{SITE_NAME}}">
  <meta property="og:locale" content="{{OG_LOCALE}}">
  {{OG_IMAGE_TAG}}
  <meta name="twitter:card" content="{{TWITTER_CARD}}">
  <meta name="twitter:title" content="{{PAGE_TITLE}}">
  <meta name="twitter:description" content="{{META_DESCRIPTION}}">
  {{TWITTER_IMAGE_TAG}}
  {{GOOGLE_SITE_VERIFICATION_TAG}}
  {{STRUCTURED_DATA}}
  <link rel="stylesheet" href="./styles/main.css">
  {{ANALYTICS_HEAD}}
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header id="header-template">
      <!-- Gerado dinamicamente -->
    </header>
    
    <!-- MAIN -->
    <main>
      <!-- SUMMARY -->
      <section id="about-section">
        <h2>About</h2>
        <div id="summary-content" class="summary"></div>
      </section>
      
      <!-- EXPERIENCE -->
      <section id="experience-section">
        <h2>Experience</h2>
        <div id="experience-list"></div>
      </section>
      
      <!-- EDUCATION -->
      <section id="education-section">
        <h2>Education</h2>
        <div id="education-list"></div>
      </section>
      
      <!-- CERTIFICATIONS -->
      <section id="certs-section">
        <h2>Certifications & Awards</h2>
        <div id="certs-list" class="cert-list"></div>
      </section>
      
      <!-- SKILLS -->
      <section id="skills-section">
        <h2>Skills</h2>
        <div id="skills-list" class="skills-grid"></div>
      </section>
    </main>
  </div>

  <script src="./scripts/email-reveal.js"></script>
</body>
</html>

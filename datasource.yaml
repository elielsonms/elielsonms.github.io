    summary: >
      I'm a curious and experienced web developer, having started working with software development in 2007. I'm Java 8 Certified (2018). I'm passionate about microservices, cloud architecture, and building scalable solutions, and since the AI frenzy started I've been trying to get into it while not letting AI lower the quality of what I deliver.
    experience:
      - title: Backend Developer
        company: Meridian (contractor via Revelo)
        period: Jul 2024 - Mar 2026
        duration: 1 year and 8 months
        description: >
          Worked as a contractor designing, building, and maintaining microservices, doing code reviews, production support, and some interaction with DevOps. I worked on several projects related to the company's mission of offering a cheap and simple way to do online payments.
          Over time each engineer became responsible for one or more services, and I owned the Risk microservice and its integrations with external systems such as Sardine. I consistently used AI tools like Copilot and ChatGPT as side helpers, and in my last three months the company shifted to vibecoding with Codex agent.
          Technologies included Temporal as workflow orchestrator, Kubernetes for microservice orchestration, Ktor + Coroutines for internal and external APIs, GraphQL for internal systems, and observability with Sentry, Micrometer, OpenTelemetry, Grafana, and Prometheus.
        highlights:
          - "Migration of a legacy platform from AWS Step Functions to Kotlin"
          - "Integration with Slack API"
      - title: Backend Engineer Specialist
        company: Tracfone (contractor via Marlabs)

          Spring Boot, Quarkus, and Node.js were used as application platforms, with RabbitMQ decoupling services and GitHub Actions pipelines supporting CI/CD.
          I worked on POCs with AWS Cognito, Quarkus, Go cronjobs, and automated tests with docker-compose and RestAssured; built Spring Boot and Quarkus applications from scratch with Kotlin; wrote Python cronjobs and Kubernetes manifests; produced diagrams for some flows; created Terraform for Cognito and API Gateway; improved CI pipelines; and built integrations with Stripe, Google Play Developer API, Vindi, and App Store receipt validation.
